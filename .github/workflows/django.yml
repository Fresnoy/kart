name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # On définit ici les services (Postgres & ES) comme sur Travis
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
        env:
          discovery.type: single-node
          ES_JAVA_OPTS: "-Dlog4j2.disable.jmx=true"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox tox-gh-actions

    - name: Prepare environment (Before Script)
      run: |
        # Création de la DB (Postgres est dispo sur localhost:5432)
        psql -h localhost -U postgres -c 'create database "test.db.pg";'
        # Tes copies de fichiers de config
        cp kart/site_settings.py.dev kart/site_settings.py
        for file in school/templates/emails/*.dev; do cp "$file" "${file%.dev}"; done
      env:
        PGPASSWORD: "" # Pas de mot de passe car trust mode activé plus haut

    - name: Run Tox
      run: tox